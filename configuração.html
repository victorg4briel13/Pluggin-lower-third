<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Simples</title>
  <link rel="stylesheet" href="style.css">
  <script src="script_painel_de_controle.js" defer></script>
</head>
<body>

  <div class="cabecalho">

    <div class="painel">
      <a href="painel de controle.html" class="link-voltar">
        <div class="painel-header"><h2 class="painel-titulo">◀ Voltar</h2></div>
      </a>
    </div>
    
  </div>

  <div class="painel">
    <div class="painel-header"><h2 class="painel-titulo">GC personalizado</h2></div>
    <div class="painel-body">
      <div class="color-row">
        <label for="cor_principal">Cor principal</label>
        <input type="color" id="cor_principal" value="#235aff">
      </div>

      <div class="color-row">
        <label for="texto1">Texto 1</label>
        <input type="color" id="texto1" value="#ffffff">
      </div>

      <div class="color-row">
        <label for="cor_secundaria">Cor secundária</label>
        <input type="color" id="cor_secundaria" value="#3C404D">
      </div>

      <div class="color-row">
        <label for="texto2">Texto 2</label>
        <input type="color" id="texto2" value="#f1f1f1">
      </div>
    </div>
  </div>

  <div class="painel">
    <div class="painel-header">
      <h2 class="painel-titulo">Versão</h2>
      <h5 id="versao-display">2.0.0</h5>
    </div>
    <div class="painel-body">
      <div class="lista-botoes">
        <a href="https://github.com/victorg4briel13/Pluggin-lower-third/releases" target="_blank">
          <button id="botao-atualizar" class="botao">Atualizar</button>
        </a>
      </div>
    </div>
  </div>
  
</body>

<a href="painel de controle.html">@https.victor073</a> 

</html>
