<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Simples</title>
  <link rel="stylesheet" href="style.css">
  <script src="script_painel_de_controle.js" defer></script>
</head>
<body>

  <div class="cabecalho">
    <div class="painel-tema">
      <label for="tema-select">Tema:</label>
      <select id="tema-select">
        <option value="vazio" selected disabled>Selecionar tema</option>
        <option value="padrao">Padrão</option>
        <option value="novosentido">Novo Sentido</option>
        <option value="semanadeoracao">Semana de Oração</option>
        <option value="personalizado">Personalizado</option>
        <option value="teste">Teste</option>
      </select>
    </div>

    <div class="botao-config"> 
      <a href="configuração.html">⚙️</a>
    </div>
  </div>

  <div class="painel">
    <div class="painel-header">
      <h2 class="painel-titulo">Transmissão</h2>
      <label class="switch">
        <input type="checkbox" id="painel-switchlowerthird">
        <span class="slider"></span>
      </label>
    </div>
    <div class="painel-body">
      <label for="nome2"></label>
      <input type="text" id="nome" placeholder="Nome">
      <input type="text" id="info" placeholder="Info">
    </div>
    <div class="painel-botoes">
      <button class="botao-salvo" data-slot="1">1</button>
      <button class="botao-salvo" data-slot="2">2</button>
      <button class="botao-salvo" data-slot="3">3</button>
      <button class="botao-salvo" data-slot="4">4</button>
      <button class="botao-salvo" data-slot="5">5</button>
      <button class="botao-salvo" data-slot="6">6</button>
      <button class="botao-salvo" data-slot="7">7</button>
      <button class="botao-salvo" data-slot="8">8</button>
    </div>
  </div>

  <div class="painel">
    <div class="painel-header">
      <h2 class="painel-titulo">Banco de Dados</h2>
    </div>
    <div class="painel-body">
      <input type="text" id="busca-db" placeholder="🔍 Pesquisar nome ou info...">
      
      <div style="margin-bottom: 10px;">
        <input type="text" id="novo-nome-db" placeholder="Nome" style="width: 100%; box-sizing: border-box; margin-bottom: 5px;">
        <div style="display: flex; gap: 5px;">
          <input type="text" id="novo-info-db" placeholder="Info" style="margin:0; flex:1;">
          <button id="btn-salvar-db" class="botao" style="width: 40px; padding: 0;">+</button>
        </div>
      </div>
      
      <div id="lista-db" class="lista-resultados">
        </div>
    </div>
  </div>
 
  <div class="painel">
    <div class="painel-header">
      <h2 class="painel-titulo">Teste</h2>
      <label class="switch">
        <input type="checkbox" id="painel-switchteste">
        <span class="slider"></span>
      </label>
    </div>
  </div>
  

  <div class="painel">
    <label for="notes" style="margin-bottom:5px">Notas</label><br>
    <textarea id="notes" rows="6"></textarea>
  </div>
</body>



</html>
